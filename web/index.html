<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ZestChat - Message with zest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ZestChat">
  <meta name="msapplication-navbutton-color" content="#B5E853">
  <meta name="theme-color" content="#0A0F0A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZestChat</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0F0A;
      margin: 0;
      overscroll-behavior: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #0A0F0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
    }
    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #B5E853, #8BC34A);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(181,232,83,0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .logo-ring svg { width: 36px; height: 36px; fill: #0A0F0A; }
    .app-name {
      color: #F0F8E8;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .loader {
      width: 40px;
      height: 3px;
      background: #1A231A;
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #B5E853, #CCff66);
      border-radius: 3px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(181,232,83,0.5); }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
      </svg>
    </div>
    <div class="app-name">ZestChat</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const l = document.getElementById('loading');
      if (l) {
        l.style.transition = 'opacity 0.4s ease';
        l.style.opacity = '0';
        setTimeout(() => l.remove(), 400);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
