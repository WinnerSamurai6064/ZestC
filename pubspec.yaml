name: zestchat
description: ZestChat - A modern messenger with lime green glass UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  web_socket_channel: ^2.4.4
  provider: ^6.1.2
  file_picker: ^8.0.3
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
